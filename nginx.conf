events {}

http {

    upstream backend {
        # ip_hash;
        server app:8000;
        # server app2:8000;
        # server app3:8000;
        # server app4:8000;
        # server app5:8000;
        # server app6:8000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
        }
    }
}